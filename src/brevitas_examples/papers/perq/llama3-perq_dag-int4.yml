# PeRQ† settings
disable_block_rotation_for_fused: true  # online block rotations; fused full rotations
permute_fn: massdiff
rotation: fused_no_fx  # fuse rotations whenever possible
rotation_block_size: 32
# SpinQuant settings
optimize_rotations: true
optimizer_dtype: float32
nsamples_rot_calibration: 800
learning_rate: 1.5
weight_decay: 0.0
lr_scheduler_type: cosine
max_steps: 100
save_safetensors: false
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
logging_steps: 10
log_on_each_node: false
torch_empty_cache_steps: 1
gradient_checkpointing: true
# other settings
dataset_eval_split: test
dtype: bfloat16
eval: true
few_shot_eval: lighteval
few_shot_override_batch_size: 128
few_shot_tasks:
- arc:challenge|0
- arc:easy|0
- winogrande|0
- hellaswag_lm_eval|0
- piqa_lm_eval|0
few_shot_zeroshot: true
gpxq_act_order: true
gpxq_block_name: model.layers
gpxq_use_quant_activations: true
gpxq_buffer_device: same
input_bit_width: 4
input_quant_granularity: per_row
input_scale_type: dynamic
replace_rmsnorm: true
rotation_sdpa_regions: true
rotation_mode: had
rotation_orphan_sink: true
seed: 42
model: meta-llama/Llama-3.2-1B-Instruct
weight_bit_width: 4
weight_param_method: mse
weight_quant_granularity: per_channel
weight_quant_type: sym
