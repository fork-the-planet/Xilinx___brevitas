dataset_eval_split:
- test
# if disable_block_rotation_for_fused=True, then block rotations are
# only applied to online rotations, leaving fused rotations as full-vector
disable_block_rotation_for_fused:
- true
dtype:
- bfloat16
eval:
- true
gpxq_act_order:
- true
gpxq_block_name:
- model.layers
gpxq_use_quant_activations:
- true
gpxq_buffer_device:
- same
input_bit_width:
- 4
input_quant_granularity:
- per_row
input_scale_type:
- dynamic
# "null" is no permute
permute_fn:
- null
- massdiff
qronos:
- true
qronos_alpha:
- 0.001
replace_rmsnorm:
- true
rotation:
- fused_no_fx
rotation_sdpa_regions:
- true
rotation_mode:
- had
rotation_orphan_sink:
- true
# "null" is full-vector rotations
rotation_block_size:
- null
- 16
- 32
- 64
- 128
- 256
- 512
- 1024
- 2048
seed:
- 42
model:
- meta-llama/Llama-3.1-8B-Instruct
- meta-llama/Llama-3.2-3B-Instruct
- meta-llama/Llama-3.2-1B-Instruct
weight_bit_width:
- 4
weight_param_method:
- mse
weight_quant_granularity:
- per_channel
weight_quant_type:
- sym
