# ======================
# Model/Dataset settings
# ======================
model:
- meta-llama/Llama-3.2-1B
- meta-llama/Llama-3.2-3B
- meta-llama/Llama-3.1-8B
- Qwen/Qwen2.5-1.5B
- Qwen/Qwen2.5-3B
- Qwen/Qwen2.5-7B
seed:
- 0
seqlen:
- 2048
nsamples:
- 512
dataset:
- pile
# adds a BOS token to the beginning of each sequence
bos_preprocessing:
- sequence
dtype:
- float32
# ===================
# Evaluation settings
# ===================
eval:
- true
few_shot_eval:
- lighteval
few_shot_limit:
- null
few_shot_override_batch_size:
- 16
few_shot_tasks:
- - leaderboard|arc:challenge|0|0
  - leaderboard|winogrande|0|0
  - lighteval|arc:easy|0|0
  - leaderboard|hellaswag|0|0
  - lighteval|piqa|0|0
few_shot_zeroshot:
- true
# ==================
# Stage 1: Transform
# ==================
rotation:
- fused_no_fx
optimize_rotations:
- true
rotation_mode:
- had
rotation_orphan_sink:
- true
# =================
# Stage 2: Rounding
# =================
qronos:
- false
- true
qronos_alpha:
- 0.001

gptq:
- false
- true
gpxq_act_order:
- true

learned_round:
- null
- linear_round
learned_round_fast_update:
- true
learned_round_iters:
- 500
learned_round_lr:
- 0.005
learned_round_scale:
- true
learned_round_scale_lr:
- 0.001
learned_round_scale_momentum:
- 0.1
# ========================================================================
# Weight (4-bit) and activation (4-bit) integer quantization configuration
# ========================================================================
scaling_min_val:
- 0.0001
weight_bit_width:
- 4
weight_group_dim:
- null
weight_group_size:
- null
weight_param_method:
- stats
weight_quant_format:
- int
weight_quant_granularity:
- per_channel
weight_quant_type:
- sym
weight_scale_precision:
- signed_float_scale

input_bit_width:
- 4
input_group_size:
- 32
input_param_method:
- stats
input_quant_format:
- int
input_quant_granularity:
- per_row
input_quant_type:
- asym
input_scale_precision:
- signed_float_scale
input_scale_type:
- dynamic
# ===================================
# Rotation optimization configuration
# ===================================
gradient_accumulation_steps:
- 8
gradient_checkpointing:
- true
learning_rate:
- 1.5
log_on_each_node:
- false
logging_steps:
- 10
lr_scheduler_type:
- cosine
max_steps:
- 100
per_device_train_batch_size:
- 1
rotation_sdpa_regions:
- true
save_safetensors:
- false
torch_empty_cache_steps:
- 1
weight_decay:
- 0.0
